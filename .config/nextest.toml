[profile.default]
# E2E tests hit shared, stateful services and are not safe to run in parallel.
retries = 3
# Keep libtest parallelism available by default for non-stateful packages.
test-threads = 15

[[profile.default.overrides]]
filter = 'package(kalam-cli)'
# Force complete serialization for CLI e2e binaries.
threads-required = 15
retries = 3

[[profile.default.overrides]]
filter = 'package(kalam-client)'
threads-required = 15
retries = 3

[[profile.default.overrides]]
filter = 'package(kalam-pg-extension)'
# pgrx-backed tests reuse a shared Postgres data directory and must not run in parallel.
threads-required = 15
retries = 3

[[profile.default.overrides]]
filter = 'test(test_scenario_08_subscription_reconnect)'
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
# Store test results in JUnit format
junit.path = "junit.xml"

# Show output for failed tests immediately
failure-output = "immediate-final"

# Don't fail fast - run all tests
fail-fast = false

# Retry flaky tests once
retries = 1
