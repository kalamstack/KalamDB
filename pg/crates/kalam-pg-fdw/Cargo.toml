[package]
name = "kalam-pg-fdw"
version = { workspace = true }
edition = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[[test]]
name = "import_foreign_schema"
required-features = ["import-foreign-schema"]

[features]
default = []
import-foreign-schema = ["dep:kalam-pg-types", "kalamdb-commons/table-definition"]

[dependencies]
datafusion-common = { workspace = true }
kalam-pg-api = { path = "../kalam-pg-api" }
kalam-pg-common = { path = "../kalam-pg-common" }
kalam-pg-types = { path = "../kalam-pg-types", optional = true }
kalamdb-commons = { path = "../../../backend/crates/kalamdb-commons", default-features = false, features = ["rows"] }
