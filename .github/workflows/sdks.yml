name: SDKs

on:
  workflow_dispatch:
    inputs:
      npm_publish:
        description: "Publish TypeScript SDK to npm"
        type: boolean
        required: false
        default: false
      force_npm_publish:
        description: "Force republish (unpublish existing version first)"
        type: boolean
        required: false
        default: false
      dart_publish:
        description: "Publish Dart SDK to pub.dev"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.92.0"
  WASM_PACK_VERSION: "0.14.0"
  RUSTC_WRAPPER: ""
  CARGO_BUILD_RUSTC_WRAPPER: ""

jobs:
  resolve_versions:
    name: Resolve SDK Versions
    runs-on: ubuntu-latest
    outputs:
      root_version: ${{ steps.versions.outputs.root_version }}
      ts_version: ${{ steps.versions.outputs.ts_version }}
      dart_version: ${{ steps.versions.outputs.dart_version }}
      sdk_version: ${{ steps.versions.outputs.sdk_version }}
      release_tag: ${{ steps.versions.outputs.release_tag }}
      release_server_asset_name: ${{ steps.versions.outputs.release_server_asset_name }}
      release_server_asset_url: ${{ steps.versions.outputs.release_server_asset_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve versions and release asset
        id: versions
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          ROOT_VERSION="$(sed -n '/^\[workspace.package\]/,/^\[/{s/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p}' Cargo.toml | head -n1)"
          if [[ -z "$ROOT_VERSION" ]]; then
            echo "Failed to read [workspace.package].version from Cargo.toml" >&2
            exit 1
          fi

          SDK_VERSION="$ROOT_VERSION"
          RELEASE_TAG="v${SDK_VERSION}"
          RELEASE_SERVER_ASSET_NAME="kalamdb-server-${SDK_VERSION}-linux-x86_64.tar.gz"
          RELEASE_SERVER_ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${RELEASE_SERVER_ASSET_NAME}"

          # Use the GitHub Releases API to verify the asset exists.
          # Direct HEAD probes against the download URL fail because GitHub
          # redirects to a time-limited S3 pre-signed GET URL that rejects HEAD.
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          echo "Checking GitHub release: ${API_URL}"
          RELEASE_JSON="$(curl -fsS \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL" 2>&1)" || {
            echo "GitHub release ${RELEASE_TAG} not found or API error." >&2
            echo "Publish the GitHub release assets first, then rerun the SDK workflow." >&2
            exit 1
          }

          if ! echo "$RELEASE_JSON" | grep -qF "\"${RELEASE_SERVER_ASSET_NAME}\""; then
            echo "Missing released server binary for ${RELEASE_TAG}: ${RELEASE_SERVER_ASSET_NAME}" >&2
            echo "Publish the GitHub release assets first, then rerun the SDK workflow." >&2
            exit 1
          fi

          echo "root_version=$ROOT_VERSION" >> "$GITHUB_OUTPUT"
          echo "ts_version=$SDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "dart_version=$SDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "sdk_version=$SDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_server_asset_name=$RELEASE_SERVER_ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "release_server_asset_url=$RELEASE_SERVER_ASSET_URL" >> "$GITHUB_OUTPUT"

          echo "Resolved workspace version: $ROOT_VERSION"
          echo "Resolved SDK version: $SDK_VERSION (from Cargo.toml)"
          echo "Using published release server binary: $RELEASE_SERVER_ASSET_NAME"

  download_release_server_binary:
    name: Download Released SDK Server Binary
    runs-on: ubuntu-latest
    needs: resolve_versions
    steps:
      - name: Download release server asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          ASSET_NAME="${{ needs.resolve_versions.outputs.release_server_asset_name }}"
          ASSET_URL="${{ needs.resolve_versions.outputs.release_server_asset_url }}"
          mkdir -p release-server dist

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            -o "dist/${ASSET_NAME}" \
            "$ASSET_URL"

          tar -xzf "dist/${ASSET_NAME}" -C release-server
          chmod +x "release-server/kalamdb-server-${{ needs.resolve_versions.outputs.sdk_version }}-linux-x86_64"
          mv "release-server/kalamdb-server-${{ needs.resolve_versions.outputs.sdk_version }}-linux-x86_64" release-server/kalamdb-server
          ls -la release-server/

      - name: Upload SDK test server binary
        uses: actions/upload-artifact@v6
        with:
          name: sdk-test-server-linux-x86_64
          path: release-server/kalamdb-server
          if-no-files-found: error

  sdk_tests_typescript:
    name: TypeScript SDK Tests
    runs-on: ubuntu-latest
    needs:
      - resolve_versions
      - download_release_server_binary
    if: ${{ always() && needs.resolve_versions.result == 'success' }}
    outputs:
      total: ${{ steps.parse_typescript_badge.outputs.total }}
      passed: ${{ steps.parse_typescript_badge.outputs.passed }}
      failed: ${{ steps.parse_typescript_badge.outputs.failed }}
      message: ${{ steps.parse_typescript_badge.outputs.message }}
      color: ${{ steps.parse_typescript_badge.outputs.color }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download server binary
        uses: actions/download-artifact@v6
        with:
          name: sdk-test-server-linux-x86_64
          path: .

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev pkg-config libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: sdk-tests-typescript
          cache-on-failure: true

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install wasm-pack
        shell: bash
        run: |
          set -euo pipefail
          cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked
          wasm-pack --version

      - name: Prepare server binary
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./kalamdb-server
          echo "SDK test source: release-binary"

      - name: Start TypeScript SDK server
        shell: bash
        run: |
          set -euo pipefail
          cp backend/server.example.toml ts-sdk-server.toml
          sed -i 's|data_path = "./data"|data_path = "./ts-test-data"|g' ts-sdk-server.toml
          sed -i 's|logs_path = "./logs"|logs_path = "./ts-test-data/logs"|g' ts-sdk-server.toml
          sed -i 's|jwt_secret = ".*"|jwt_secret = "sdk-test-secret-key-minimum-32-characters-long"|g' ts-sdk-server.toml
          mkdir -p ts-test-data/rocksdb ts-test-data/storage ts-test-data/logs
          : > ts-sdk-server.log
          ./kalamdb-server ts-sdk-server.toml > ts-sdk-server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          for i in {1..60}; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1 || curl -sf http://localhost:8080/v1/api/healthcheck > /dev/null 2>&1; then
              echo "✅ TypeScript SDK test server ready (${i}s)"
              if [[ -s ts-sdk-server.log ]]; then
                echo "Recent server log output:"
                tail -n 40 ts-sdk-server.log || true
              fi
              exit 0
            fi
            kill -0 "$SERVER_PID" 2>/dev/null || { echo "❌ Server died"; cat ts-sdk-server.log; exit 1; }
            echo "  Waiting... ($i/60)"
            sleep 1
          done
          echo "❌ Timed out waiting for TypeScript SDK test server"
          cat ts-sdk-server.log || true
          exit 1

      - name: Bootstrap TypeScript SDK test admin user
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS http://localhost:8080/v1/api/auth/setup \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"kalamdb123","root_password":"kalamdb123"}' \
            >/dev/null

      - name: Run TypeScript SDK tests
        id: run_typescript_tests
        continue-on-error: true
        shell: bash
        env:
          KALAMDB_URL: "http://localhost:8080"
          KALAMDB_USER: "admin"
          KALAMDB_PASSWORD: "kalamdb123"
          KALAMDB_SERVER_BIN: ${{ github.workspace }}/kalamdb-server
          KALAMDB_SKIP_SERVER_START: "true"
          KALAMDB_SKIP_AUTH_SETUP: "true"
          TS_SDK_SERVER_LOG: ${{ github.workspace }}/ts-sdk-server.log
        run: |
          set -euo pipefail
          ./scripts/test-typescript-sdk-release.sh

      - name: Parse TypeScript SDK test counts
        if: always()
        id: parse_typescript_badge
        shell: bash
        env:
          STEP_OUTCOME: ${{ steps.run_typescript_tests.outcome }}
        run: |
          set -euo pipefail
          python3 <<'PYTHON'
          import os
          import re
          from pathlib import Path

          output_path = Path("ts-sdk-test-output.txt")
          text = output_path.read_text(encoding="utf-8", errors="replace") if output_path.exists() else ""

          total = sum(int(value) for value in re.findall(r"^# tests (\d+)$", text, flags=re.MULTILINE))
          passed = sum(int(value) for value in re.findall(r"^# pass (\d+)$", text, flags=re.MULTILINE))
          failed = sum(int(value) for value in re.findall(r"^# fail (\d+)$", text, flags=re.MULTILINE))
          outcome = os.environ.get("STEP_OUTCOME", "failure")

          if total == 0 and outcome == "success":
              message = "passed"
              color = "brightgreen"
          elif total == 0:
              message = "failed"
              color = "red"
          else:
              message = f"{passed}/{total} passed" if failed == 0 and outcome == "success" else f"{passed}/{total} passed, {failed} failed"
              color = "brightgreen" if failed == 0 and outcome == "success" else "red"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"total={total}\n")
              handle.write(f"passed={passed}\n")
              handle.write(f"failed={failed}\n")
              handle.write(f"message={message}\n")
              handle.write(f"color={color}\n")
          PYTHON

      - name: Print TypeScript SDK server log
        if: always()
        shell: bash
        run: |
          echo "=== TypeScript SDK server log ==="
          cat ts-sdk-server.log || true

      - name: Stop TypeScript SDK server
        if: always()
        shell: bash
        run: |
          [[ -n "${SERVER_PID:-}" ]] && kill "$SERVER_PID" 2>/dev/null || true

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ts-sdk-server-log
          path: ts-sdk-server.log
          if-no-files-found: ignore

      - name: Upload TypeScript SDK test output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ts-sdk-test-output
          path: ts-sdk-test-output.txt
          if-no-files-found: ignore

      - name: Fail if TypeScript SDK tests failed
        if: always() && steps.run_typescript_tests.outcome != 'success'
        shell: bash
        run: |
          echo "TypeScript SDK tests failed" >&2
          exit 1

  sdk_tests_dart:
    name: Dart SDK Tests
    runs-on: ubuntu-latest
    needs:
      - resolve_versions
      - download_release_server_binary
    if: ${{ always() && needs.resolve_versions.result == 'success' }}
    outputs:
      total: ${{ steps.parse_dart_badge.outputs.total }}
      passed: ${{ steps.parse_dart_badge.outputs.passed }}
      failed: ${{ steps.parse_dart_badge.outputs.failed }}
      message: ${{ steps.parse_dart_badge.outputs.message }}
      color: ${{ steps.parse_dart_badge.outputs.color }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download server binary
        uses: actions/download-artifact@v6
        with:
          name: sdk-test-server-linux-x86_64
          path: .

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev pkg-config libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust (dart bridge)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: dart-bridge
          cache-on-failure: true
          workspaces: link -> link/target

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare server binary
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./kalamdb-server
          echo "SDK test source: release-binary"

      - name: Start SDK test server
        shell: bash
        run: |
          set -euo pipefail
          cp backend/server.example.toml server.toml
          sed -i 's|data_path = "./data"|data_path = "./test-data"|g' server.toml
          sed -i 's|logs_path = "./logs"|logs_path = "./test-data/logs"|g' server.toml
          sed -i 's|jwt_secret = ".*"|jwt_secret = "sdk-test-secret-key-minimum-32-characters-long"|g' server.toml
          mkdir -p test-data/rocksdb test-data/storage test-data/logs
          ./kalamdb-server server.toml > dart-sdk-server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          for i in {1..60}; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1 || curl -sf http://localhost:8080/v1/api/healthcheck > /dev/null 2>&1; then
              echo "✅ SDK test server ready (${i}s)"
              if [[ -s dart-sdk-server.log ]]; then
                echo "Recent server log output:"
                tail -n 40 dart-sdk-server.log || true
              fi
              exit 0
            fi
            kill -0 "$SERVER_PID" 2>/dev/null || { echo "❌ Server died"; cat dart-sdk-server.log; exit 1; }
            echo "  Waiting... ($i/60)"
            sleep 1
          done
          echo "❌ Timed out waiting for SDK test server"
          cat dart-sdk-server.log || true
          exit 1

      - name: Bootstrap SDK test admin user
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS http://localhost:8080/v1/api/auth/setup \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"kalamdb123","root_password":"kalamdb123"}' \
            >/dev/null

      - name: Run Dart SDK tests
        id: run_dart_tests
        continue-on-error: true
        shell: bash
        working-directory: link/sdks/dart
        env:
          KALAM_URL: "http://localhost:8080"
          KALAM_USER: "admin"
          KALAM_PASS: "kalamdb123"
        run: |
          set -euo pipefail
          flutter pub get

          BRIDGE_DIR="$PWD/../../kalam-link-dart"
          (
            cd "$BRIDGE_DIR"
            CARGO_TARGET_DIR="$BRIDGE_DIR/target" cargo build --release
          )

          flutter analyze

          flutter test --machine test/models_test.dart | tee ../../../dart-sdk-models-machine.jsonl

          export KALAM_INTEGRATION_TEST=1
          flutter test --machine \
            test/e2e/auth/auth_test.dart \
            test/e2e/query/query_test.dart \
            test/e2e/ddl/ddl_test.dart \
            test/e2e/lifecycle/lifecycle_test.dart \
            test/e2e/health/health_test.dart \
            test/e2e/subscription/subscription_test.dart | tee ../../../dart-sdk-e2e-machine.jsonl

      - name: Parse Dart SDK test counts
        if: always()
        id: parse_dart_badge
        shell: bash
        env:
          STEP_OUTCOME: ${{ steps.run_dart_tests.outcome }}
        run: |
          set -euo pipefail
          python3 <<'PYTHON'
          import json
          import os
          from pathlib import Path

          def iter_events(path: Path):
              if not path.exists():
                  return
              for raw_line in path.read_text(encoding="utf-8", errors="replace").splitlines():
                  line = raw_line.strip()
                  if not line:
                      continue
                  try:
                      parsed = json.loads(line)
                  except json.JSONDecodeError:
                      continue
                  events = parsed if isinstance(parsed, list) else [parsed]
                  for event in events:
                      if isinstance(event, dict):
                          yield event

          hidden = {}
          total = 0
          passed = 0
          failed = 0

          for path_str in ("dart-sdk-models-machine.jsonl", "dart-sdk-e2e-machine.jsonl"):
              for event in iter_events(Path(path_str)):
                  event_type = event.get("type")
                  if event_type == "testStart":
                      test_info = event.get("test", {})
                      test_id = test_info.get("id")
                      if test_id is not None:
                          hidden[test_id] = bool(test_info.get("hidden", False))
                  elif event_type == "testDone":
                      test_id = event.get("testID")
                      if hidden.get(test_id, False):
                          continue
                      total += 1
                      result = event.get("result")
                      if result == "success":
                          passed += 1
                      elif result in {"failure", "error"}:
                          failed += 1

          outcome = os.environ.get("STEP_OUTCOME", "failure")
          if total == 0 and outcome == "success":
              message = "passed"
              color = "brightgreen"
          elif total == 0:
              message = "failed"
              color = "red"
          else:
              message = f"{passed}/{total} passed" if failed == 0 and outcome == "success" else f"{passed}/{total} passed, {failed} failed"
              color = "brightgreen" if failed == 0 and outcome == "success" else "red"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"total={total}\n")
              handle.write(f"passed={passed}\n")
              handle.write(f"failed={failed}\n")
              handle.write(f"message={message}\n")
              handle.write(f"color={color}\n")
          PYTHON

      - name: Print Dart SDK server log
        if: always()
        shell: bash
        run: |
          echo "=== Dart SDK server log ==="
          cat dart-sdk-server.log || true

      - name: Stop SDK test server
        if: always()
        shell: bash
        run: |
          [[ -n "${SERVER_PID:-}" ]] && kill "$SERVER_PID" 2>/dev/null || true

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dart-sdk-server-log
          path: dart-sdk-server.log
          if-no-files-found: ignore

      - name: Upload Dart SDK test output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dart-sdk-test-output
          path: |
            dart-sdk-models-machine.jsonl
            dart-sdk-e2e-machine.jsonl
          if-no-files-found: ignore

      - name: Fail if Dart SDK tests failed
        if: always() && steps.run_dart_tests.outcome != 'success'
        shell: bash
        run: |
          echo "Dart SDK tests failed" >&2
          exit 1

  update_sdk_badges:
    name: Update SDK Badges
    runs-on: ubuntu-latest
    needs:
      - sdk_tests_typescript
      - sdk_tests_dart
    if: ${{ always() && needs.sdk_tests_typescript.result != 'cancelled' && needs.sdk_tests_dart.result != 'cancelled' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update SDK badge files
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main
          git checkout main

          mkdir -p .github/badges

          cat > .github/badges/sdk-typescript-tests.json <<EOF
          {
            "schemaVersion": 1,
            "label": "typescript sdk tests (${{ needs.sdk_tests_typescript.outputs.total }})",
            "message": "${{ needs.sdk_tests_typescript.outputs.message }}",
            "color": "${{ needs.sdk_tests_typescript.outputs.color }}"
          }
          EOF

          cat > .github/badges/sdk-dart-tests.json <<EOF
          {
            "schemaVersion": 1,
            "label": "dart sdk tests (${{ needs.sdk_tests_dart.outputs.total }})",
            "message": "${{ needs.sdk_tests_dart.outputs.message }}",
            "color": "${{ needs.sdk_tests_dart.outputs.color }}"
          }
          EOF

          if git diff --quiet -- .github/badges/sdk-typescript-tests.json .github/badges/sdk-dart-tests.json; then
            echo "SDK badge files already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/sdk-typescript-tests.json .github/badges/sdk-dart-tests.json
          git commit -m "docs: update sdk test badges"
          git push origin main

  publish_npm:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    needs:
      - resolve_versions
      - sdk_tests_typescript
    if: ${{ github.event.inputs.npm_publish == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        shell: bash
        run: |
          set -euo pipefail
          cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked
          wasm-pack --version

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: npm-publish
          cache-on-failure: true

      - name: Publish TypeScript SDK to npm
        shell: bash
        working-directory: link/sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve_versions.outputs.ts_version }}"
          FORCE_FLAG=""
          if [[ "${{ github.event.inputs.force_npm_publish }}" == "true" ]]; then
            FORCE_FLAG="--force"
          fi
          chmod +x ./publish.sh
          ./publish.sh --version "$VERSION" $FORCE_FLAG

  publish_dart:
    name: Publish Dart SDK to pub.dev
    runs-on: ubuntu-latest
    needs:
      - sdk_tests_dart
    if: ${{ github.event.inputs.dart_publish == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure pub.dev credentials
        shell: bash
        env:
          PUB_DEV_CREDENTIALS_JSON: ${{ secrets.PUB_DEV_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail
          if [[ -z "${PUB_DEV_CREDENTIALS_JSON}" ]]; then
            echo "❌ Missing required secret: PUB_DEV_CREDENTIALS_JSON"
            exit 1
          fi

          mkdir -p "$HOME/.pub-cache"
          printf '%s' "$PUB_DEV_CREDENTIALS_JSON" > "$HOME/.pub-cache/credentials.json"
          chmod 600 "$HOME/.pub-cache/credentials.json"

      - name: Publish Dart package
        shell: bash
        working-directory: link/sdks/dart
        run: |
          set -euo pipefail
          chmod +x ./publish.sh
          ./publish.sh
