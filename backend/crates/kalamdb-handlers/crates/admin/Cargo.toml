[package]
name = "kalamdb-handlers-admin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Administrative SQL handlers for KalamDB"

[dependencies]
kalamdb-commons = { path = "../../../kalamdb-commons", default-features = false }
kalamdb-core = { path = "../../../kalamdb-core" }
kalamdb-handlers-support = { path = "../support" }
kalamdb-jobs = { path = "../../../kalamdb-jobs" }
kalamdb-raft = { path = "../../../kalamdb-raft" }
kalamdb-session = { path = "../../../kalamdb-session" }
kalamdb-sql = { package = "kalamdb-dialect", path = "../../../kalamdb-dialect" }
kalamdb-system = { path = "../../../kalamdb-system" }

arrow = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt"] }

[lib]
doctest = false

[dev-dependencies]
datafusion = { workspace = true }
kalamdb-core = { path = "../../../kalamdb-core", features = ["test-helpers"] }