[package]
name = "kalamdb-tables"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Table providers for user, shared, and stream tables in KalamDB"
keywords = ["kalamdb", "database", "tables", "providers"]
categories = ["database"]

[dependencies]
# Internal crates
kalamdb-commons = { path = "../kalamdb-commons", features = ["full"] }
kalamdb-macros = { path = "../kalamdb-macros" }
kalamdb-store = { path = "../kalamdb-store" }
kalamdb-filestore = { path = "../kalamdb-filestore" }
kalamdb-system = { path = "../kalamdb-system" }
kalamdb-streams = { path = "../kalamdb-streams" }
kalamdb-sharding = { path = "../kalamdb-sharding" }
kalamdb-session = { path = "../kalamdb-session" }
kalamdb-session-datafusion = { path = "../kalamdb-session-datafusion" }
kalamdb-transactions = { path = "../kalamdb-transactions" }
kalamdb-vector = { path = "../kalamdb-vector" }
kalamdb-datafusion-sources = { workspace = true }

# Apache Arrow ecosystem
arrow = { workspace = true }
datafusion = { workspace = true }
datafusion-datasource = { workspace = true }

# Async
async-trait = { workspace = true }
tokio = { workspace = true }
futures-util = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Time handling
chrono = { workspace = true }

# Logging
log = { workspace = true }
tracing = { workspace = true }
once_cell = { workspace = true }

[dev-dependencies]
ntest = { workspace = true }
tempfile = { workspace = true }

[lib]
name = "kalamdb_tables"
path = "src/lib.rs"
