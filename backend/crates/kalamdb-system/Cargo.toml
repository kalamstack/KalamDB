[package]
name = "kalamdb-system"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "System table providers and metadata management for KalamDB"
keywords = ["kalamdb", "database", "system-tables", "metadata"]
categories = ["database"]

[dependencies]
# Internal crates
kalamdb-commons = { path = "../kalamdb-commons", features = ["full"] }
kalamdb-macros = { path = "../kalamdb-macros" }
kalamdb-session-datafusion = { path = "../kalamdb-session-datafusion" }
kalamdb-store = { path = "../kalamdb-store", features = ["datafusion"] }

# Apache Arrow ecosystem
arrow = { workspace = true }
datafusion = { workspace = true }

# Concurrent data structures
parking_lot = { workspace = true }

# Async
async-trait = { workspace = true }
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
flexbuffers = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Time handling
chrono = { workspace = true }

# Logging
log = { workspace = true }
tracing = { workspace = true }

# OnceCell for lazy caches
once_cell = { workspace = true }

[lib]
name = "kalamdb_system"
path = "src/lib.rs"
doctest = false

[dev-dependencies]
tempfile = { workspace = true }
