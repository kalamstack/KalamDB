[server]
host = "127.0.0.1"
port = 8080
workers = 0
enable_http2 = true

[storage]
data_path = "./data"
shared_tables_template = "{namespace}/{tableName}"
user_tables_template = "{namespace}/{tableName}/{userId}"

[storage.rocksdb]
block_cache_size = 2097152
max_background_jobs = 2

[storage.rocksdb.cf_profiles.system_meta]
write_buffer_size = 32768
max_write_buffers = 2

[storage.rocksdb.cf_profiles.system_index]
write_buffer_size = 32768
max_write_buffers = 2

[storage.rocksdb.cf_profiles.hot_data]
write_buffer_size = 131072
max_write_buffers = 2

[storage.rocksdb.cf_profiles.hot_index]
write_buffer_size = 65536
max_write_buffers = 2

[storage.rocksdb.cf_profiles.raft]
write_buffer_size = 262144
max_write_buffers = 2

[datafusion]
memory_limit = 67108864
query_parallelism = 2
max_partitions = 2
batch_size = 1024

[flush]
default_row_limit = 10000
default_time_interval = 300
flush_batch_size = 10000
check_interval_seconds = 60

[retention]
default_deleted_retention_hours = 168
enable_dba_stats = false
dba_stats_retention_days = 7

[stream]
default_ttl_seconds = 10
default_max_buffer = 10000
eviction_interval_seconds = 60

[manifest_cache]
eviction_interval_seconds = 300
max_entries = 500
eviction_ttl_days = 7
user_table_weight_factor = 10

[limits]
max_message_size = 1048576
max_query_limit = 1000
default_query_limit = 50

[logging]
level = "info"
logs_path = "./logs"
log_to_console = false
format = "json"
slow_query_threshold_ms = 1000

[logging.otlp]
enabled = false
endpoint = "http://127.0.0.1:4317"
protocol = "grpc"
service_name = "kalamdb-server"
timeout_ms = 3000

[performance]
request_timeout = 30
keepalive_timeout = 75
max_connections = 20000000
backlog = 4096
worker_max_blocking_threads = 4000
client_request_timeout = 10
client_disconnect_timeout = 5
max_header_size = 16384

[rate_limit]
max_queries_per_sec = 100000
max_messages_per_sec = 10000
max_subscriptions_per_user = 500000
max_auth_requests_per_ip_per_sec = 200000
max_connections_per_ip = 200000
max_requests_per_ip_per_sec = 200000
request_body_limit_bytes = 104857600
ban_duration_seconds = 300
enable_connection_protection = false
cache_max_entries = 1000
cache_ttl_seconds = 600

[security]
max_request_body_size = 10485760
max_ws_message_size = 1048576
allowed_ws_origins = []
strict_ws_origin_check = false

[security.cors]
allowed_origins = []
allowed_methods = ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
allowed_headers = ["Authorization", "Content-Type", "Accept", "Origin", "X-Requested-With"]
expose_headers = []
allow_credentials = true
max_age = 3600
allow_private_network = false

[websocket]
client_timeout_secs = 120
auth_timeout_secs = 15
heartbeat_interval_secs = 30

[authentication]
bcrypt_cost = 4
min_password_length = 8
max_password_length = 72
disable_common_password_check = false
jwt_secret = "kalamdb-bench-local-2026-04-03-jwt-secret-32-plus"
jwt_trusted_issuers = ""
auto_create_users_from_provider = false

[oauth]
enabled = false
auto_provision = false
default_role = "user"

[shutdown.flush]
timeout = 300

[jobs]
max_concurrent = 10
max_retries = 3
retry_backoff_ms = 100
wal_cleanup_interval_seconds = 300

[execution]
handler_timeout_seconds = 30
max_parameters = 50
max_parameter_size_bytes = 524288

[cluster]
node_id = 1
rpc_addr = "127.0.0.1:9188"
api_addr = "127.0.0.1:8080"
user_shards = 8
shared_shards = 1
max_snapshots_to_keep = 1
replication_timeout_ms = 5000